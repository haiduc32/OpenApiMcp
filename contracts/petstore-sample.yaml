openapi: 3.0.3
info:
  title: Petstore Sample API
  version: 1.0.0
  description: >
    A sample Petstore API for testing the OpenAPI MCP server. Place your own .yaml or .json OpenAPI files in this directory and they will be loaded automatically on startup.
servers:
- url: https://petstore.example.com/v1
  description: Production
tags:
- name: pets
  description: Everything about pets
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      tags:
      - pets
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
      responses:
        200:
          description: A list of pets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetList'
    post:
      operationId: addPet
      summary: Create a new pet
      tags:
      - pets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
      responses:
        201:
          description: Pet created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        400:
          description: Invalid input
  /pets/{petId}:
    get:
      operationId: getPet
      summary: Get a pet by ID
      tags:
      - pets
      parameters:
      - name: petId
        in: path
        required: true
        schema:
          type: string
      responses:
        200:
          description: A single pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        404:
          description: Pet not found
    put:
      operationId: updatePet
      summary: Update a pet by ID
      tags:
      - pets
      parameters:
      - name: petId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
      responses:
        200:
          description: Pet updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        400:
          description: Invalid input
        404:
          description: Pet not found
components:
  schemas:
    Pet:
      type: object
      required:
      - id
      - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        tag:
          type: string
    PetList:
      type: array
      items:
        $ref: '#/components/schemas/Pet'
