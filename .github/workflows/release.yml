name: Release NuGet Tool

on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Extract Version
        id: get_version
        run: |
          VERSION="${{ vars.PACKAGE_VERSION_MAJOR }}.${{ vars.PACKAGE_VERSION_MINOR }}.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release /p:Version=${{ env.VERSION }} /p:AssemblyVersion=${{ env.VERSION }}

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/OpenApiMcp/OpenApiMcp.csproj -c Release /p:Version=${{ env.VERSION }} /p:AssemblyVersion=${{ env.VERSION }} --no-build -o ./nupkgs

      - name: Push to NuGet
        run: dotnet nuget push "./nupkgs/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source "https://api.nuget.org/v3/index.json" --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
